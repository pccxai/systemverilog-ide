name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  claim-scan:
    name: claim-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: forbidden-claim grep
        run: |
          set -e
          python3 - <<'PY'
          import os, re, sys
          PATTERN = re.compile(
              r"(?:\bis\s+|\bnow\s+|\balready\s+|\bcurrently\s+)?"
              r"(production[- ]ready|marketplace[- ]ready|"
              r"(?<!pre-)stable\s+(?:plugin\s+)?(?:api|abi|lsp)|"
              r"(?<!pre-)stable\s+diagnostics\s+envelope|"
              r"mcp\s+ready|ai\s+provider\s+ready|"
              r"kv260\s+inference\s+(?:works|works\s+now|is\s+working|is\s+functional)|"
              r"20\s*tok/s\s+achieved|timing[- ]closed|"
              r"autonomous\s+coding\s+product|vibe\s+coding|"
              r"(?:claude|gpt)\s+directly\s+controls|"
              r"complete\s+ai\s+integration|fully\s+(?:verified|validated)|"
              r"ci-covered|approved\s+runner\s+proves)",
              re.IGNORECASE,
          )
          NEGATION = re.compile(
              r"\b(?:no|not|never|avoid|without|forbidden|skip|do not"
              r"|does not|is not|are not|unsupported)\b",
              re.IGNORECASE,
          )
          SCAN_EXTS = {".md", ".sh", ".yml", ".yaml"}
          SKIP_DIRS = {".git"}
          SKIP_FILES = {".github/workflows/ci.yml"}
          violations = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [
                  d for d in dirs
                  if os.path.relpath(os.path.join(root, d), ".") not in SKIP_DIRS
              ]
              for name in files:
                  rel = os.path.relpath(os.path.join(root, name), ".")
                  if rel in SKIP_FILES:
                      continue
                  if not any(rel.endswith(ext) for ext in SCAN_EXTS):
                      continue
                  with open(rel, encoding="utf-8", errors="replace") as fh:
                      lines = fh.read().splitlines()
                      for index, line in enumerate(lines):
                          context = " ".join(
                              lines[i]
                              for i in range(max(0, index - 2), min(len(lines), index + 2))
                          )
                          if PATTERN.search(line) and not NEGATION.search(context):
                              violations.append(f"{rel}:{index + 1}: {line}")
          if violations:
              print("Forbidden positive claims detected:")
              for v in violations:
                  print(v)
              print(
                  "::error::Rephrase as target / planned / pending verification.",
              )
              sys.exit(1)
          print("claim-scan clean")
          PY

  link-sanity:
    name: link-sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: required files
        run: |
          set -e
          for f in README.md LICENSE; do
            if [ ! -f "$f" ]; then
              echo "::error::missing required file: $f"
              exit 1
            fi
          done
          echo "required files present"
      - name: README cross-repo links
        run: |
          # Cheap sanity: ensure we still link to the four sibling pccxai repos.
          set -e
          for repo in pccx pccx-lab pccx-FPGA-NPU-LLM-kv260 pccx-llm-launcher; do
            if ! grep -qE "pccxai/$repo" README.md; then
              echo "::error::README missing reference to pccxai/$repo"
              exit 1
            fi
          done
          echo "all expected sibling-repo references present"

  scaffold-smoke:
    name: scaffold-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: python -m pip install --upgrade pip pytest "jsonschema>=4"
      - name: pytest
        run: python -m pytest -q
      - name: cli smoke (ok fixture)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli check fixtures/ok_module.sv
      - name: cli smoke (broken fixture exits non-zero)
        run: |
          set -e
          if PYTHONPATH=src python -m pccx_ide_cli check \
              fixtures/missing_endmodule.sv; then
            echo "::error::expected non-zero exit on broken fixture"
            exit 1
          fi
          echo "broken fixture correctly produced diagnostics"
      - name: cli smoke (empty fixture exits non-zero)
        run: |
          set -e
          if PYTHONPATH=src python -m pccx_ide_cli check fixtures/empty.sv; then
            echo "::error::expected non-zero exit on empty fixture"
            exit 1
          fi
          echo "empty fixture correctly produced diagnostics"
      - name: schema dump
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli schema | python -c "import json,sys; json.load(sys.stdin)"
      - name: cli smoke (pccx-lab backend missing binary fails clearly)
        run: |
          set -e
          # pccx-lab is not installed in CI; the backend must fail without scaffold fallback.
          if PYTHONPATH=src PCCX_LAB_BIN="" python -m pccx_ide_cli check \
              fixtures/ok_module.sv --backend pccx-lab; then
            echo "::error::expected non-zero exit when pccx-lab binary is missing"
            exit 1
          fi
          echo "missing pccx-lab binary correctly fails"
      - name: cli smoke (index single file exits zero, JSON parses)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli index \
              fixtures/modules/simple_module.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-index'"
          echo "index single-file smoke ok"
      - name: cli smoke (index directory exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli index fixtures/modules \
              | python -c "import json,sys; d=json.load(sys.stdin); assert len(d['modules'])>0"
          echo "index directory smoke ok"
      - name: cli smoke (declarations directory exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli declarations fixtures/modules \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='declarations'; assert len(d['declarations'])>0"
          echo "declarations directory smoke ok"
      - name: cli smoke (hierarchy view exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli hierarchy \
              fixtures/organization/hierarchy_top.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-hierarchy-view'; assert d['safety']['writes_files'] is False"
          echo "hierarchy view smoke ok"
      - name: cli smoke (dependency view exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli dependencies \
              fixtures/organization/hierarchy_top.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-dependency-view'; assert d['safety']['writes_files'] is False"
          echo "dependency view smoke ok"
      - name: cli smoke (module fanout exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli module-fanout \
              fixtures/organization/fanout_hierarchy.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-fanout-report'; assert d['safety']['writes_files'] is False; assert d['safety']['emits_command_descriptors'] is False"
          echo "module fanout smoke ok"
      - name: cli smoke (module fanin exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli module-fanin \
              fixtures/organization/fanout_hierarchy.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-fanin-report'; assert d['safety']['writes_files'] is False; assert d['safety']['emits_command_descriptors'] is False"
          echo "module fanin smoke ok"
      - name: cli smoke (module paths exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli module-paths \
              fixtures/organization/fanout_hierarchy.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-path-report'; assert d['safety']['writes_files'] is False; assert d['safety']['emits_command_descriptors'] is False"
          echo "module paths smoke ok"
      - name: cli smoke (module edges exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli module-edges \
              fixtures/organization/fanout_hierarchy.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-edge-report'; assert d['safety']['writes_files'] is False; assert d['safety']['emits_command_descriptors'] is False"
          echo "module edges smoke ok"
      - name: cli smoke (module summary exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli module-summary \
              fixtures/organization/hierarchy_top.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-summary-view'; assert d['safety']['writes_files'] is False"
          echo "module summary smoke ok"
      - name: cli smoke (boundary audit exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli boundary-audit \
              fixtures/organization/hierarchy_top.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-boundary-audit'; assert d['safety']['writes_files'] is False"
          echo "boundary audit smoke ok"
      - name: cli smoke (refactor candidates exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli refactor-candidates \
              fixtures/organization/hierarchy_top.sv \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-refactor-candidate-list'; assert d['safety']['writes_files'] is False; assert d['safety']['emits_command_descriptors'] is False"
          echo "refactor candidates smoke ok"
      - name: cli smoke (module context exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli module-context \
              fixtures/organization/hierarchy_top.sv --module leaf_mod \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-context-bundle'; assert d['safety']['writes_files'] is False"
          echo "module context smoke ok"
      - name: cli smoke (refactor impact exits zero)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli refactor-impact \
              fixtures/organization/hierarchy_top.sv --module leaf_mod \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='module-refactor-impact-view'; assert d['safety']['writes_files'] is False"
          echo "refactor impact smoke ok"
      - name: cli smoke (index missing path exits non-zero)
        run: |
          set -e
          if PYTHONPATH=src python -m pccx_ide_cli index \
              fixtures/modules/does_not_exist.sv; then
            echo "::error::expected non-zero exit for missing index path"
            exit 1
          fi
          echo "index missing path correctly fails"
      - name: cli smoke (xsim-log clean JSON)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli xsim-log \
              fixtures/xsim/clean.log --format json \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='xsim-log'; assert d['diagnostics']==[]"
          echo "xsim-log clean JSON smoke ok"
      - name: cli smoke (xsim-log mixed text)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli xsim-log \
              fixtures/xsim/mixed.log --format text \
              | grep -q "5 diagnostics"
          echo "xsim-log mixed text smoke ok"
      - name: cli smoke (problems from-check JSON)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli problems from-check \
              fixtures/ok_module.sv --format json \
              | python -c "import json,sys; d=json.load(sys.stdin); assert d['kind']=='editor-problems'; assert d['problems']==[]"
          echo "problems from-check JSON smoke ok"
      - name: cli smoke (problems from-xsim-log text)
        run: |
          set -e
          PYTHONPATH=src python -m pccx_ide_cli problems from-xsim-log \
              fixtures/xsim/mixed.log --format text \
              | grep -q "5 problems"
          echo "problems from-xsim-log text smoke ok"
      - name: editor bridge smoke script
        run: bash scripts/editor-bridge-smoke.sh
      - name: editor bridge example drift check
        run: bash scripts/check-editor-bridge-examples.sh
      - name: VS Code adapter prototype smoke
        run: bash scripts/vscode-adapter-smoke.sh
